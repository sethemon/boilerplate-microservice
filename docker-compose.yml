version: "3.9"

# ── Shared configuration ───────────────────────────────────────────────────────
x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/microservice_db
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  LOG_LEVEL: INFO
  APP_ENV: development

services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runtime
    image: microservice-boilerplate:latest
    container_name: microservice_app
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
    volumes:
      - ./logs:/app/logs          # persist logs on host
      - ./config:/app/config:ro   # hot-reload config (dev only)
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: microservice_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: microservice_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microservice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: microservice_rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI  →  http://localhost:15672  (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Optional: MySQL alternative ──────────────────────────────────────────────
  # mysql:
  #   image: mysql:8.3
  #   container_name: microservice_mysql
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: microservice_db
  #     MYSQL_USER: user
  #     MYSQL_PASSWORD: password
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user", "-ppassword"]
  #     interval: 10s
  #     retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  # mysql_data:
